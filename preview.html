<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой интернет-магазин — просмотр</title>
  <style>
    html, body { margin: 0; height: 100%; }
    /* Сайт ученика занимает всю вкладку */
    #frame { display: block; border: 0; width: 100%; height: 100%; }
    #empty {
      display: none;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #333;
      padding: 40px;
      line-height: 1.6;
      text-align: center;
    }
    #empty.show { display: block; }
    #frame.hide { display: none; }
  </style>
</head>
<body>
  <!-- Сайт рендерится внутри iframe (его srcdoc берём из localStorage). -->
  <iframe id="frame" title="Просмотр сайта"></iframe>
  <div id="empty">
    <h1>Тут появится твой сайт 🛍️</h1>
    <p>Вернись на платформу и нажми «▶ Запустить» — эта вкладка обновится сама.</p>
  </div>

  <script>
    // Ключ совпадает с PREVIEW_DOC_KEY в main.js: платформа кладёт сюда готовый
    // документ на каждый «Запустить», а мы его показываем и переотображаем при
    // изменении (событие storage приходит из другой вкладки того же origin).
    var KEY = "previewDoc";
    var frame = document.getElementById("frame");
    var empty = document.getElementById("empty");

    function render() {
      var doc = null;
      try { doc = localStorage.getItem(KEY); } catch (e) {}
      if (doc) {
        empty.classList.remove("show");
        frame.classList.remove("hide");
        frame.srcdoc = doc;
      } else {
        frame.classList.add("hide");
        empty.classList.add("show");
      }
    }

    // Платформа нажала «Запустить» → обновился ключ → перерисовываем.
    window.addEventListener("storage", function (e) {
      if (e.key === KEY || e.key === null) render();
    });

    render();
  </script>
</body>
</html>
