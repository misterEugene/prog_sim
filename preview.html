<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой интернет-магазин — просмотр</title>
  <style>
    html, body { margin: 0; height: 100%; }
    /* Сайт ученика занимает всю вкладку */
    #frame { display: block; border: 0; width: 100%; height: 100%; }
    #empty {
      display: none;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #333;
      padding: 40px;
      line-height: 1.6;
      text-align: center;
    }
    #empty.show { display: block; }
    #frame.hide { display: none; }
  </style>
</head>
<body>
  <!-- Сайт рендерится внутри iframe (его srcdoc берём из localStorage). -->
  <iframe id="frame" title="Просмотр сайта"></iframe>
  <div id="empty">
    <h1>Тут появится твой сайт 🛍️</h1>
    <p>Вернись на платформу и нажми «▶ Запустить» — эта вкладка обновится сама.</p>
  </div>

  <script>
    // Документ сайта платформа присылает двумя путями:
    //  1) НАПРЯМУЮ через postMessage (основной путь — работает даже из file://
    //     и в Firefox, где localStorage между вкладками не делится);
    //  2) через localStorage[KEY] + событие storage (запасной путь — по http).
    var KEY = "previewDoc";
    var DEFAULT_TITLE = "Мой интернет-магазин — просмотр";
    var frame = document.getElementById("frame");
    var empty = document.getElementById("empty");
    var currentDoc = null; // последний документ, полученный напрямую (приоритетный)

    // Название вкладки браузера берётся из <title> ЭТОЙ страницы, а не из <title>
    // внутри iframe (стандарт). Поэтому достаём <title> ученика из документа и
    // присваиваем его document.title — тогда во вкладке виден заголовок сайта.
    function applyTitle(doc) {
      var m = /<title>([\s\S]*?)<\/title>/i.exec(doc || "");
      var t = m ? m[1].trim() : "";
      document.title = t || DEFAULT_TITLE;
    }

    function render() {
      var doc = currentDoc;
      if (doc == null) { try { doc = localStorage.getItem(KEY); } catch (e) {} }
      if (doc) {
        empty.classList.remove("show");
        frame.classList.remove("hide");
        frame.srcdoc = doc;
        applyTitle(doc);
      } else {
        frame.classList.add("hide");
        empty.classList.add("show");
        document.title = DEFAULT_TITLE;
      }
    }

    // Основной путь: платформа прислала документ напрямую (на открытие и на каждый
    // «Запустить»). Берём его как приоритетный и перерисовываем.
    window.addEventListener("message", function (e) {
      var data = e.data;
      if (data && data.__preview === true && typeof data.doc === "string") {
        currentDoc = data.doc;
        render();
      }
    });

    // Запасной путь: по http событие storage прилетает при изменении ключа.
    window.addEventListener("storage", function (e) {
      if (e.key === KEY || e.key === null) render();
    });

    // Сайт показывается внутри iframe, поэтому #hash этой вкладки прокидываем ему —
    // тогда «отражённый XSS» из урока 2 работает по-настоящему: добавил в адресную
    // строку #welcome=… (или выполнил location.hash=… в консоли этой вкладки) — и сайт
    // реагирует. Применяем при смене хэша и после каждой перезагрузки iframe (srcdoc).
    function syncHashToFrame() {
      try { if (location.hash) frame.contentWindow.location.hash = location.hash; } catch (e) {}
    }
    window.addEventListener("hashchange", syncHashToFrame);
    frame.addEventListener("load", syncHashToFrame);

    // Попросить платформу (окно-родитель) прислать актуальный документ. Вызываем
    // при загрузке и при возврате фокуса (вдруг платформу перезагрузили).
    function askOpener() {
      try { if (window.opener) window.opener.postMessage({ __previewRequest: true }, "*"); } catch (e) {}
    }
    window.addEventListener("focus", askOpener);
    askOpener();
    render();
  </script>
</body>
</html>
