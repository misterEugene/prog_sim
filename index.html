<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Урок программирования</title>
  <!-- Стили разнесены по модулям (порядок = каскад: база → раскладка → … → адаптив) -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/editor.css">
  <link rel="stylesheet" href="css/markdown.css">
  <link rel="stylesheet" href="css/preview.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Верхняя панель: заголовок урока и общие кнопки управления -->
  <header class="topbar">
    <h1 id="lesson-title" class="lesson-title">Урок</h1>
    <div class="control-buttons">
      <button id="run-btn" type="button" class="btn btn-primary">▶ Запустить</button>
      <button id="open-tab-btn" type="button" class="btn">🔗 Открыть в новой вкладке</button>
      <button id="reset-btn" type="button" class="btn">↺ Начать заново</button>
      <button id="hint-btn" type="button" class="btn">💡 Подсказка</button>
      <button id="download-btn" type="button" class="btn">⬇ Скачать проект</button>
    </div>
  </header>

  <!-- Три колонки: задание | редакторы кода | результат.
       Между колонками - перетаскиваемые разделители (.splitter), как в VS Code.
       Ширина колонок задаётся через flex-grow (доля от свободного места). -->
  <main class="layout" id="layout">
    <!-- КОЛОНКА 1: Задание (Markdown урока) -->
    <section class="col col-task" id="col-task">
      <button class="col-reopen" type="button" title="Развернуть">📖 Урок</button>
      <div class="col-header">
        <span class="col-title">📖 Урок</span>
        <button class="col-collapse" type="button" title="Свернуть колонку" aria-label="Свернуть">⟨⟩</button>
      </div>
      <div id="task.md" class="markdown-body"></div>
    </section>

    <div class="splitter" id="split-1" role="separator" aria-orientation="vertical"
         title="Потяни, чтобы изменить ширину"></div>

    <!-- КОЛОНКА 2: Редакторы кода.
         Редактор = подсветка (<pre>) под прозрачным <textarea> (приём «оверлей»). -->
    <section class="col col-editors" id="col-editors">
      <button class="col-reopen" type="button" title="Развернуть">⟨ Код ⟩</button>
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="index.html" role="tab">index.html</button>
        <button class="tab"        data-tab="style.css"  role="tab">style.css</button>
        <button class="tab"        data-tab="main.js"    role="tab">main.js</button>
        <button class="col-collapse" type="button" title="Свернуть колонку" aria-label="Свернуть">⟨⟩</button>
      </div>
      <div class="content">
        <div class="tab-pane editor-wrap" data-pane="index.html">
          <div class="gutter" aria-hidden="true"></div>
          <pre class="highlight" aria-hidden="true"><code></code></pre>
          <textarea id="index.html" class="editor" data-lang="html" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" wrap="off"></textarea>
          <div class="swatch-layer" aria-hidden="true"></div>
        </div>

        <div class="tab-pane editor-wrap" data-pane="style.css" hidden>
          <div class="gutter" aria-hidden="true"></div>
          <pre class="highlight" aria-hidden="true"><code></code></pre>
          <textarea id="style.css" class="editor" data-lang="css" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" wrap="off"></textarea>
          <div class="swatch-layer" aria-hidden="true"></div>
        </div>

        <div class="tab-pane editor-wrap" data-pane="main.js" hidden>
          <div class="gutter" aria-hidden="true"></div>
          <pre class="highlight" aria-hidden="true"><code></code></pre>
          <textarea id="main.js" class="editor" data-lang="js" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" wrap="off"></textarea>
          <div class="swatch-layer" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <div class="splitter" id="split-2" role="separator" aria-orientation="vertical"
         title="Потяни, чтобы изменить ширину"></div>

    <!-- КОЛОНКА 3: Результат (предпросмотр + консоль) -->
    <section class="col col-preview" id="col-preview">
      <button class="col-reopen" type="button" title="Развернуть">Результат</button>
      <div class="col-header preview-header">
        <span class="col-title">Результат</span>
        <button class="col-collapse" type="button" title="Свернуть колонку" aria-label="Свернуть">⟨⟩</button>
      </div>
      <iframe
        id="preview"
        title="Результат выполнения кода"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>

      <!-- Встроенная консоль: вывод console.log/ошибок без DevTools -->
      <div class="console-panel">
        <div class="console-header">
          <span>🖥 Консоль</span>
          <button id="console-clear" type="button" class="btn btn-small">Очистить</button>
        </div>
        <div id="console-output" class="console-output" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <!-- Скрытый нативный выбор цвета (палитра + пипетка ОС). Открывается кликом по
       цветному чипу у hex-цвета в редакторе; выбранный цвет подставляется в код. -->
  <input type="color" id="color-input" aria-hidden="true" tabindex="-1">

  <!-- Модальное окно подтверждения «Начать заново»: чтобы случайно не стереть
       весь прогресс, ребёнок должен ВРУЧНУЮ ввести фразу-подтверждение. -->
  <div id="reset-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="reset-modal-title">
      <h2 id="reset-modal-title" class="modal-title">⚠ Начать заново?</h2>
      <p class="modal-text">
        Вы точно уверены, что хотите начать заново? Весь ваш код и прогресс будут
        удалены, а это действие <strong>необратимо</strong>.
      </p>
      <p class="modal-text">Чтобы подтвердить, введите в поле ниже фразу:</p>
      <p id="reset-modal-phrase" class="modal-phrase"></p>
      <input
        type="text"
        id="reset-modal-input"
        class="modal-input"
        placeholder="Введите фразу точно так же"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false">
      <div class="modal-actions">
        <button id="reset-modal-cancel" type="button" class="btn">Отмена</button>
        <button id="reset-modal-confirm" type="button" class="btn btn-danger" disabled>
          Да, начать заново
        </button>
      </div>
    </div>
  </div>

  <!-- Контейнер для тостов (подсказка) -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Emmet-превью: всплывающая подсказка со структурой, которую вставит Tab -->
  <div id="emmet-preview" class="emmet-preview" hidden>
    <div class="emmet-preview-hint">⇥ Tab развернёт:</div>
    <pre class="emmet-preview-code"><code></code></pre>
  </div>

  <!-- Скрипты - классические (НЕ ES-модули): работают и из file://. Подключаются
       с defer (выполняются по порядку, до DOMContentLoaded). Порядок логический;
       все межмодульные вызовы происходят в функциях на DOMContentLoaded, когда
       загружено уже всё. main.js (точка входа) - последним. -->
  <script src="js/emmet.js" defer></script>
  <script src="js/lesson-data.js" defer></script>
  <script src="js/dom.js" defer></script>
  <script src="js/markdown.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/editor.js" defer></script>
  <script src="js/highlight.js" defer></script>
  <script src="js/swatches.js" defer></script>
  <script src="js/history.js" defer></script>
  <script src="js/emmet-integration.js" defer></script>
  <script src="js/lesson-render.js" defer></script>
  <script src="js/console.js" defer></script>
  <script src="js/preview.js" defer></script>
  <script src="js/zip.js" defer></script>
  <script src="js/toast.js" defer></script>
  <script src="js/reset.js" defer></script>
  <script src="js/tabs.js" defer></script>
  <script src="js/layout.js" defer></script>
  <script src="js/dev-cheat.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
