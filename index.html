<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Урок программирования</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="layout">
    <!-- ЛЕВАЯ ПАНЕЛЬ: заголовок, кнопки, вкладки, редактор/описание -->
    <section class="panel left-panel">
      <!-- Панель управления -->
      <header class="controls">
        <h1 id="lesson-title" class="lesson-title">Урок</h1>
        <div class="control-buttons">
          <button id="run-btn" type="button" class="btn btn-primary">▶ Запустить</button>
          <button id="reset-btn" type="button" class="btn">↺ Начать заново</button>
          <button id="hint-btn" type="button" class="btn">💡 Подсказка</button>
          <button id="download-btn" type="button" class="btn">⬇ Скачать проект</button>
        </div>
      </header>

      <!-- Вкладки -->
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="task.md"    role="tab">📖 Урок</button>
        <button class="tab"        data-tab="index.html" role="tab">index.html</button>
        <button class="tab"        data-tab="style.css"  role="tab">style.css</button>
        <button class="tab"        data-tab="main.js"    role="tab">main.js</button>
      </div>

      <!-- Область содержимого: либо описание (Markdown), либо редактор кода.
           Редактор = подсветка (<pre>) под прозрачным <textarea> (приём «оверлей»). -->
      <div class="content">
        <div id="task.md" class="tab-pane markdown-body" data-pane="task.md"></div>

        <div class="tab-pane editor-wrap" data-pane="index.html" hidden>
          <pre class="highlight" aria-hidden="true"><code></code></pre>
          <textarea id="index.html" class="editor" data-lang="html" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" wrap="off"></textarea>
        </div>

        <div class="tab-pane editor-wrap" data-pane="style.css" hidden>
          <pre class="highlight" aria-hidden="true"><code></code></pre>
          <textarea id="style.css" class="editor" data-lang="css" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" wrap="off"></textarea>
        </div>

        <div class="tab-pane editor-wrap" data-pane="main.js" hidden>
          <pre class="highlight" aria-hidden="true"><code></code></pre>
          <textarea id="main.js" class="editor" data-lang="js" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off" wrap="off"></textarea>
        </div>
      </div>
    </section>

    <!-- ПРАВАЯ ПАНЕЛЬ: предпросмотр + консоль -->
    <section class="panel right-panel">
      <div class="preview-header">Результат</div>
      <iframe
        id="preview"
        title="Результат выполнения кода"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>

      <!-- Встроенная консоль: вывод console.log/ошибок без DevTools -->
      <div class="console-panel">
        <div class="console-header">
          <span>🖥 Консоль</span>
          <button id="console-clear" type="button" class="btn btn-small">Очистить</button>
        </div>
        <div id="console-output" class="console-output" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <!-- Контейнер для тостов (подсказка) -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Emmet-превью: всплывающая подсказка со структурой, которую вставит Tab -->
  <div id="emmet-preview" class="emmet-preview" hidden>
    <div class="emmet-preview-hint">⇥ Tab развернёт:</div>
    <pre class="emmet-preview-code"><code></code></pre>
  </div>

  <script src="emmet.js" defer></script>
  <script src="main.js" defer></script>
</body>
</html>
